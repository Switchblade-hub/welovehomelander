                        <h4 className="mt-12">Technological Contributions</h4>

                        <div className="mt-8 p-8 bg-gold/5 border border-gold/10 rounded-3xl">

        const ArchiveTab = () => html`

                    </div>

                    <div className="space-y-12 lg:space-y-20">
                        <section>
                            <div className="flex items-center gap-4 mb-6 lg:mb-8">

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-8">
                                ${ARCHIVE_DATA.world.map((h, i) => html`

                            </div>
                        </section>

                        <section>
                            <div className="flex items-center gap-4 mb-6 lg:mb-8">
                                <h3 className="font-serif text-2xl lg:text-5xl font-black italic text-brown">Tanzanian <span className="text-gold">Leaders</span></h3>

                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-8">
                                ${ARCHIVE_DATA.tanzania.map((h, i) => html`
                                    <div key=${`tanzania-${i}`} className="organic-card p-6 lg:p-12 rounded-[1.5rem] lg:rounded-[2.5rem] shadow-sm vellum-texture group relative overflow-hidden transition-all">
                                        <div className="flex items-center gap-3 mb-4 lg:mb-8">
                                            <div className="h-[1px] w-6 lg:w-8 bg-gold/50"></div>
                                            <span className="text-[0.5rem] lg:text-[0.55rem] font-black text-gold uppercase tracking-[0.4em]">Tanzania #${i+1}</span>
                                        </div>
                                        <h3 className="font-serif text-2xl lg:text-4xl font-black text-brown mb-3 lg:mb-6 italic group-hover:text-gold transition-colors">${h.name}</h3>
                                        <div className="text-brown/60 font-serif text-base lg:text-xl italic leading-relaxed">${h.bio}</div>
                                    </div>
                                `)}
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        `;

        const OthersTab = () => html`
            <div key="OTHERS" className="flex-1 p-5 lg:p-16 overflow-y-auto pb-24 view-enter">
                <div className="max-w-4xl mx-auto">
                    <div className="mb-8 lg:mb-16">
                        <h2 className="font-serif text-4xl lg:text-9xl font-black italic text-brown tracking-tighter">The <br/><span className="text-gold">Others</span></h2>
                        <p className="text-brown/40 font-serif italic text-lg lg:text-xl mt-2 lg:mt-4 text-balance">Personnel files.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-8">
                        ${OTHERS_DATA.map((h, i) => html`
                            <div key=${`other-${i}`} className="organic-card p-6 lg:p-12 rounded-[1.5rem] lg:rounded-[2.5rem] shadow-sm vellum-texture group relative overflow-hidden transition-all">
                                <div className="flex items-center gap-3 mb-4 lg:mb-8">
                                    <div className="h-[1px] w-6 lg:w-8 bg-gold/50"></div>
                                    <span className="text-[0.5rem] lg:text-[0.55rem] font-black text-gold uppercase tracking-[0.4em]">Entry #${i+1}</span>
                                </div>
                                <h3 className="font-serif text-2xl lg:text-4xl font-black text-brown mb-3 lg:mb-6 italic group-hover:text-gold transition-colors">${h.name}</h3>
                                <div className="text-brown/60 font-serif text-base lg:text-xl italic leading-relaxed">${h.bio}</div>
                            </div>
                        `)}
                    </div>
                </div>
            </div>
        `;

        const ConfigTab = () => {
            const [googleKey, setGoogleKey] = useState(localStorage.getItem('google_api_key') || '');
            const [openRouterKey, setOpenRouterKey] = useState(localStorage.getItem('openrouter_api_key') || '');
            const [selectedModel, setSelectedModel] = useState(localStorage.getItem('selected_ai_model') || 'gemini');

            const save = () => {
                localStorage.setItem('google_api_key', googleKey);
                localStorage.setItem('openrouter_api_key', openRouterKey);
                localStorage.setItem('selected_ai_model', selectedModel);
                alert('Saved.');
            };

            return html`
                <div key="CONFIG" className="flex-1 p-6 lg:p-12 overflow-y-auto pb-24 view-enter">
                    <div className="max-w-xl mx-auto">
                        <div className="mb-8">
                            <h2 className="font-serif text-3xl lg:text-5xl font-black italic text-brown tracking-tighter">Settings</h2>
                            <p className="text-brown/40 font-serif italic text-sm mt-1">AI Configuration</p>
                        </div>

                        <div className="space-y-6 bg-white p-6 lg:p-10 rounded-3xl border border-brown/5 shadow-sm vellum-texture">
                            <div className="space-y-3">
                                <label className="block text-[0.6rem] font-black uppercase tracking-widest text-brown/40">Model Provider</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick=${() => setSelectedModel('gemini')} className=${`py-3 rounded-xl border-2 transition-all text-[0.65rem] font-bold uppercase tracking-widest ${selectedModel === 'gemini' ? 'border-gold bg-gold/5 text-brown' : 'border-brown/5 text-brown/30 hover:border-brown/10'}`}>
                                        Google API
                                    </button>
                                    <button onClick=${() => setSelectedModel('openrouter')} className=${`py-3 rounded-xl border-2 transition-all text-[0.65rem] font-bold uppercase tracking-widest ${selectedModel === 'openrouter' ? 'border-gold bg-gold/5 text-brown' : 'border-brown/5 text-brown/30 hover:border-brown/10'}`}>
                                        OpenRouter
                                    </button>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <label className="block text-[0.6rem] font-black uppercase tracking-widest text-brown/40">Google Key</label>
                                <input type="password" value=${googleKey} onChange=${(e) => setGoogleKey(e.target.value)} placeholder="API Key" className="w-full px-5 py-3 bg-brown/5 border-none rounded-xl focus:ring-2 focus:ring-gold outline-none text-sm text-brown placeholder:text-brown/20" />
                            </div>

                            <div className="space-y-3">
                                <label className="block text-[0.6rem] font-black uppercase tracking-widest text-brown/40">OpenRouter Key</label>
                                <input type="password" value=${openRouterKey} onChange=${(e) => setOpenRouterKey(e.target.value)} placeholder="API Key" className="w-full px-5 py-3 bg-brown/5 border-none rounded-xl focus:ring-2 focus:ring-gold outline-none text-sm text-brown placeholder:text-brown/20" />
                                <p className="text-[0.55rem] text-brown/30 italic">Using: gemini-2.0-flash-lite (free)</p>
                            </div>

                            <button onClick=${save} className="w-full py-4 bg-brown text-gold rounded-xl font-black uppercase tracking-[0.2em] text-[0.65rem] shadow-md hover:bg-night transition-all active:scale-[0.98]">
                                Save
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const OracleTab = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            const clearChat = () => setMessages([]);

            const askAI = async () => {
                if (!input.trim() || loading) return;

                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                const modelType = localStorage.getItem('selected_ai_model') || 'gemini';
                const gKey = localStorage.getItem('google_api_key');
                const orKey = localStorage.getItem('openrouter_api_key');

                try {
                    let responseText = '';
                    if (modelType === 'gemini') {
                        if (!gKey) throw new Error('Key missing');
                        const ai = new GoogleGenAI({ apiKey: gKey });
                        const response = await ai.models.generateContent({
                            model: "gemini-1.5-flash",
                            contents: [{ parts: [{ text: input }] }]
                        });
                        responseText = response.text;
                    } else {
                        if (!orKey) throw new Error('Key missing');
                        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${orKey}`,
                                "Content-Type": "application/json",
                                "HTTP-Referer": window.location.origin,
                                "X-Title": "IWD Archive"
                            },
                            body: JSON.stringify({
                                "model": "google/gemini-2.0-flash-lite-preview-02-05:free",
                                "messages": [{ "role": "user", "content": input }]
                            })
                        });
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error?.message || 'OpenRouter error');
                        }
                        const data = await response.json();
                        responseText = data.choices[0].message.content;
                    }
                    setMessages(prev => [...prev, { role: 'assistant', content: responseText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${err.message}` }]);
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div key="ORACLE" className="flex-1 flex flex-col h-full view-enter">
                    <div className="p-6 lg:p-10 border-b border-brown/5 bg-white/30 backdrop-blur-sm flex justify-between items-center">
                        <h2 className="font-serif text-3xl lg:text-5xl font-black italic text-brown tracking-tighter">The Oracle</h2>
                        <button onClick=${clearChat} className="text-[0.6rem] font-black uppercase tracking-widest text-brown/30 hover:text-brown transition-colors">Clear Chat</button>
                    </div>

                    <div ref=${scrollRef} className="flex-1 overflow-y-auto p-6 space-y-6">
                        ${messages.length === 0 && html`
                            <div className="h-full flex flex-col items-center justify-center text-center opacity-10">
                                <span className="material-icons-round text-6xl text-brown">auto_awesome</span>
                            </div>
                        `}
                        ${messages.map((msg, i) => html`
                            <div key=${i} className=${`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className=${`max-w-[85%] p-5 rounded-2xl shadow-sm vellum-texture border border-brown/5 ${msg.role === 'user' ? 'bg-gold/5 text-brown' : 'bg-white text-brown'}`}>
                                    <div className="font-serif text-base italic leading-relaxed whitespace-pre-wrap">${msg.content}</div>
                                </div>
                            </div>
                        `)}
                        ${loading && html`
                            <div className="flex justify-start">
                                <div className="p-4 rounded-2xl bg-white border border-brown/5 shadow-sm vellum-texture">
                                    <div className="flex gap-1.5">
                                        <div className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style=${{ animationDelay: '0.2s' }}></div>
                                        <div className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style=${{ animationDelay: '0.4s' }}></div>
                                    </div>
                                </div>
                            </div>
                        `}
                    </div>

                    <div className="p-6 lg:p-10 bg-white/30 backdrop-blur-sm border-t border-brown/5">
                        <div className="max-w-3xl mx-auto relative">
                            <input 
                                value=${input} 
                                onChange=${(e) => setInput(e.target.value)} 
                                onKeyDown=${(e) => e.key === 'Enter' && askAI()}
                                placeholder="Consult..." 
                                className="w-full pl-6 pr-20 py-4 bg-white border border-brown/10 rounded-2xl shadow-md focus:ring-2 focus:ring-gold/20 outline-none font-serif italic text-lg text-brown placeholder:text-brown/20" 
                            />
                            <button onClick=${askAI} className="absolute right-2 top-2 w-12 h-12 bg-brown text-gold rounded-xl flex items-center justify-center shadow-md hover:bg-night transition-all active:scale-90">
                                <span className="material-icons-round">send</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('IWD');
            const [navExpanded, setNavExpanded] = useState(false);

            useEffect(() => {
                const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
                window.addEventListener('resize', fixHeight);
                fixHeight();
                return () => window.removeEventListener('resize', fixHeight);
            }, []);

            return html`
                <div className="flex h-full w-full overflow-hidden">
                    <aside className="hidden lg:flex w-64 bg-white border-r border-brown/5 flex-col p-8 z-50 shrink-0">
                        <nav className="flex-1 space-y-2">
                            ${[
                                { id: 'IWD', icon: 'female', label: 'IWD Data' }, 
                                { id: 'ARCHIVE', icon: 'history_edu', label: 'The Archive' }, 
                                { id: 'OTHERS', icon: 'folder_shared', label: 'Others' },
                                { id: 'ORACLE', icon: 'auto_awesome', label: 'The Oracle' },
                                { id: 'CONFIG', icon: 'settings', label: 'Config' }
                            ].map(item => html`
                                <button key=${item.id} onClick=${() => setActiveTab(item.id)} className=${`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all ${activeTab === item.id ? 'sidebar-active font-bold' : 'text-brown/30 hover:bg-brown/5'}`}>
                                    <span className="material-icons-round text-xl">${item.icon}</span>
                                    <span className="text-[0.65rem] font-bold uppercase tracking-widest text-balance">${item.label}</span>
                                </button>
                            `)}
                        </nav>
                        <div className="mt-auto pt-6 border-t border-brown/5">
                            <button onClick=${() => { localStorage.clear(); window.location.reload(); }} className="flex items-center gap-4 px-4 py-3.5 text-red-800/30 hover:text-red-800 transition-colors text-balance">
                                <span className="material-icons-round text-xl">power_settings_new</span>
                                <span className="text-[0.65rem] font-bold uppercase tracking-widest">Wipe Memory</span>
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-h-0 relative bg-vellum vellum-texture">
                        <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
                            ${activeTab === 'IWD' ? html`<${IWDTab} />` : 
                              activeTab === 'ARCHIVE' ? html`<${ArchiveTab} />` :
                              activeTab === 'OTHERS' ? html`<${OthersTab} />` :
                              activeTab === 'ORACLE' ? html`<${OracleTab} />` :
                              html`<${ConfigTab} />`}
                        </div>

                        <div className="lg:hidden">
                            ${navExpanded && html`
                                <div 
                                    className="fixed inset-0 bg-brown/20 backdrop-blur-sm z-[90] transition-opacity duration-300"
                                    onClick=${() => setNavExpanded(false)}
                                ></div>
                            `}
                            
                            <nav className="fixed bottom-28 right-6 z-[100] flex flex-col items-end gap-4">
                                ${navExpanded && html`
                                    <div className="flex flex-col items-end gap-4 mb-2">
                                        ${[
                                            { id: 'IWD', icon: 'female', label: 'IWD' }, 
                                            { id: 'ARCHIVE', icon: 'history_edu', label: 'Archive' }, 
                                            { id: 'OTHERS', icon: 'folder_shared', label: 'Others' },
                                            { id: 'ORACLE', icon: 'auto_awesome', label: 'Oracle' },
                                            { id: 'CONFIG', icon: 'settings', label: 'Config' }
                                        ].filter(item => item.id !== activeTab).map((item, i) => html`
                                            <div 
                                                key=${item.id} 
                                                className="flex items-center gap-3 nav-item-enter" 
                                                style=${{ animationDelay: `${i * 0.05}s` }}
                                            >
                                                <span className="px-3 py-1.5 rounded-lg glass-nav text-[0.6rem] font-black uppercase tracking-widest text-brown shadow-sm">
                                                    ${item.label}
                                                </span>
                                                <button 
                                                    onClick=${() => { setActiveTab(item.id); setNavExpanded(false); }} 
                                                    className="w-12 h-12 rounded-full glass-nav text-brown shadow-xl flex items-center justify-center transition-transform active:scale-90"
                                                >
                                                    <span className="material-icons-round text-xl">${item.icon}</span>
                                                </button>
                                            </div>
                                        `)}
                                    </div>
                                `}
                                
                                <button 
                                    onClick=${() => setNavExpanded(!navExpanded)} 
                                    className=${`w-14 h-14 rounded-full bg-brown text-gold shadow-2xl flex items-center justify-center transition-all active:scale-95 z-[101]`}
                                >
                                    <span className=${`material-icons-round text-2xl transition-transform duration-300 ${navExpanded ? 'rotate-45' : ''}`}>
                                        ${navExpanded ? 'add' : (
                                            activeTab === 'IWD' ? 'female' : 
                                            activeTab === 'ARCHIVE' ? 'history_edu' : 
                                            activeTab === 'OTHERS' ? 'folder_shared' : 
                                            activeTab === 'ORACLE' ? 'auto_awesome' : 
                                            'settings'
                                        )}
                                    </span>
                                </button>
                            </nav>
                        </div>
                    </main>
                </div>
            `;
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(html`<${App} />`);
    </script>
</body>
</html>
